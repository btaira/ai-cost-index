// ── Tiers ─────────────────────────────────────────────────────────────────────
// Local models sort into their score-based tier alongside cloud models.
// Boundaries: Elite ≥58 | High 52-57 | Mid 46-51 | Efficient 36-45 | Compact <36
const TIERS = [
  { label:"Elite",     min:58, desc:"Frontier — best available" },
  { label:"High",      min:52, desc:"Production-grade" },
  { label:"Mid",       min:46, desc:"Cost-optimized" },
  { label:"Efficient", min:36, desc:"Budget / smaller models" },
  { label:"Compact",   min:0,  desc:"Nano / edge / embedded" },
];
function getTier(m) {
  if (m.score >= 58) return TIERS[0];
  if (m.score >= 52) return TIERS[1];
  if (m.score >= 46) return TIERS[2];
  if (m.score >= 36) return TIERS[3];
  return TIERS[4];
}
function tierColor(label, t) {
  return {
    Elite:t.elite, High:t.high, Mid:t.mid, Efficient:t.efficient, Compact:"#6b7280"
  }[label] || t.textMuted;
}

// ── Amortization formula ──────────────────────────────────────────────────────
// perHr(hw, hrsPerDay) = hw.price / (hw.years * 365 * hrsPerDay)
// localCostPerMTok(hw, tps, hrsPerDay) = perHr / (tps * 3600) * 1_000_000
function perHr(hw, hrsPerDay) {
  return hw.price / (hw.years * 365 * hrsPerDay);
}
function localCostPerMTok(hw, tps, hrsPerDay) {
  if (!tps || tps <= 0) return null;
  return (perHr(hw, hrsPerDay) / (tps * 3600)) * 1_000_000;
}

// ── Refresh via Anthropic API ─────────────────────────────────────────────────
async function fetchLatestModels(cloudModels) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:5000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      system:"You are a precise AI pricing data assistant. Return ONLY a valid JSON array, no markdown, no prose.",
      messages:[{role:"user",content:`Today is ${new Date().toISOString().slice(0,10)}.
Update pricing and benchmark scores for these cloud AI models from official sources.
Models: ${cloudModels.map(m=>m.model+(m.variant?` (${m.variant})`:"")+` [${m.family}]`).join(", ")}
Return JSON array. Each element: { family, model, variant, score (Artificial Analysis Intelligence Index 0-100), input ($/1M tokens), output ($/1M tokens), tps (tokens/sec at API, number or null), reasoning (bool), note ("" if none) }
Keep ALL models. Add newer versions as extra entries. Keep existing value if uncertain. ONLY the JSON array.`}],
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  const text = data.content.map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const s=clean.indexOf("["), e=clean.lastIndexOf("]");
  if(s<0||e<0) throw new Error("No JSON array found");
  return JSON.parse(clean.slice(s,e+1))
    .filter(m=>typeof m.model==="string"&&typeof m.input==="number"&&typeof m.output==="number")
    .map(m=>({...m,note:m.note||"",variant:m.variant||"",isLocal:false}));
}

// ── TpsPanel — measure and save tokens/second for a local model ─────────────
function TpsPanel({ targetModel, userTps, onTpsChange, onClose }) {
  const { t } = useTheme();
  const [activeIdx, setActiveIdx] = useState(0);
  const [copied, setCopied] = useState(null);
  const [inputVal, setInputVal] = useState(userTps !== null ? String(userTps) : "");
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [startTime, setStartTime] = useState(null);
  const timerRef = useRef(null);

  const p = TPS_PROMPTS[activeIdx];
  const parsedTps = parseFloat(inputVal);
  const tpsValid  = inputVal !== "" && !isNaN(parsedTps) && parsedTps > 0;

  // Colour coding for TPS ranges
  function tpsColor(v) {
    if (!v || isNaN(v)) return t.textFaint;
    if (v >= 100) return t.elite;
    if (v >= 40)  return t.high;
    if (v >= 15)  return t.mid;
    return t.efficient;
  }
  function tpsLabel(v) {
    if (!v || isNaN(v)) return "";
    if (v >= 100) return "Fast — real-time feel";
    if (v >= 40)  return "Good — comfortable chat speed";
    if (v >= 15)  return "Usable — slight lag on long responses";
    return "Slow — may feel sluggish";
  }

  // Stopwatch
  function startTimer() {
    const t0 = Date.now();
    setStartTime(t0);
    setElapsed(0);
    setRunning(true);
    timerRef.current = setInterval(() => {
      setElapsed(Math.round((Date.now() - t0) / 100) / 10);
    }, 100);
  }
  function stopTimer() {
    clearInterval(timerRef.current);
    setRunning(false);
  }
  function resetTimer() {
    clearInterval(timerRef.current);
    setRunning(false);
    setElapsed(0);
    setStartTime(null);
  }
  useEffect(() => () => clearInterval(timerRef.current), []);

  // Auto-calculate TPS when user enters token count
  const [tokenCount, setTokenCount] = useState("");
  const calculatedTps = useMemo(() => {
    const toks = parseFloat(tokenCount);
    if (elapsed > 0 && toks > 0) return Math.round(toks / elapsed * 10) / 10;
    return null;
  }, [tokenCount, elapsed]);

  function useCalculated() {
    if (calculatedTps) {
      setInputVal(String(calculatedTps));
      onTpsChange(calculatedTps);
    }
  }

  function copyPrompt(text, id) {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id); setTimeout(() => setCopied(null), 2000);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(id); setTimeout(() => setCopied(null), 2000);
    });
  }

  function commitTps() {
    if (tpsValid) onTpsChange(parsedTps);
  }

  const hwColor = t.mid; // neutral — no hardware context here, just measuring

  return (
    <ModalOverlay onClose={onClose}>
      <div style={{
        background:t.pageBg, border:`2px solid ${t.borderMd}`, borderRadius:14,
        fontFamily:"'IBM Plex Mono','Courier New',monospace",
        boxShadow:"0 32px 64px rgba(0,0,0,0.4)", color:t.text,
      }}>
        {/* Header */}
        <div style={{padding:"20px 24px 16px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>
              Local TPS Measurement
            </div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:t.text,letterSpacing:"-0.02em",marginBottom:4,lineHeight:1.2}}>
              {targetModel}
            </h2>
            <p style={{fontSize:13,color:t.textMuted,lineHeight:1.6,margin:0}}>
              Paste a prompt into your local model, time the response, enter your TPS. Costs and value scores update instantly.
            </p>
          </div>
          <button onClick={onClose} style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${t.border}`,background:t.raisedBg,color:t.textMuted,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,flexShrink:0}}>
            ✕ Close
          </button>
        </div>

        {/* Current saved TPS */}
        {userTps !== null && (
          <div style={{padding:"10px 24px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:12,background:t.dark?`${t.elite}08`:"#f0fdf4"}}>
            <span style={{fontSize:13,color:t.textMuted}}>Saved TPS for this model:</span>
            <span style={{fontSize:22,fontWeight:800,color:tpsColor(userTps),fontVariantNumeric:"tabular-nums"}}>{userTps}</span>
            <span style={{fontSize:13,color:tpsColor(userTps)}}>{tpsLabel(userTps)}</span>
          </div>
        )}

        {/* Prompt selector tabs */}
        <div style={{padding:"12px 24px",borderBottom:`1px solid ${t.border}`,display:"flex",gap:8,flexWrap:"wrap"}}>
          {TPS_PROMPTS.map((pr,i) => (
            <button key={pr.id} onClick={()=>{setActiveIdx(i);resetTimer();setTokenCount("");}}
              style={{padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",
                border:`1.5px solid ${i===activeIdx?t.mid:t.border}`,
                background:i===activeIdx?`${t.mid}20`:t.surfaceBg,
                color:i===activeIdx?t.mid:t.textMuted}}>
              {pr.label}
              <span style={{fontSize:11,marginLeft:5,opacity:0.7}}>~{pr.targetTokens} tok</span>
            </button>
          ))}
          <span style={{fontSize:12,color:t.textFaint,alignSelf:"center",marginLeft:"auto"}}>{p.description}</span>
        </div>

        <div style={{padding:"20px 24px"}}>
          {/* Prompt box */}
          <div style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:8}}>Step 1 — Copy this prompt and run it in your local model</div>
          <div style={{position:"relative",marginBottom:18}}>
            <div style={{background:t.dark?"#080d18":t.raisedBg,border:`1px solid ${t.border}`,borderRadius:8,
              padding:"14px 16px",paddingRight:110,fontSize:13,color:t.textSub,lineHeight:1.65,
              whiteSpace:"pre-wrap",fontFamily:"'IBM Plex Mono','Courier New',monospace",wordBreak:"break-word"}}>
              {p.prompt}
            </div>
            <button onClick={()=>copyPrompt(p.prompt, p.id)}
              style={{position:"absolute",top:10,right:10,padding:"7px 13px",borderRadius:6,
                border:`1px solid ${copied===p.id?t.elite:t.border}`,
                background:copied===p.id?(t.dark?"#052e16":"#f0fdf4"):t.surfaceBg,
                color:copied===p.id?t.elite:t.textMuted,cursor:"pointer",fontSize:12,fontWeight:700,
                fontFamily:"inherit",whiteSpace:"nowrap",zIndex:2}}>
              {copied===p.id?"✓ Copied!":"⧉ Copy prompt"}
            </button>
          </div>

          {/* Instruction */}
          <div style={{background:t.dark?"rgba(96,165,250,0.07)":"#eff6ff",border:`1px solid ${t.dark?"rgba(96,165,250,0.22)":"#bfdbfe"}`,borderRadius:7,padding:"10px 14px",marginBottom:18,fontSize:13,color:t.textSub,lineHeight:1.6}}>
            <strong style={{color:t.mid}}>How to measure: </strong>{p.instruction}
          </div>

          {/* Built-in stopwatch */}
          <div style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:10}}>Step 2 — Optional: use the stopwatch below</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,flexWrap:"wrap",
            background:t.raisedBg,borderRadius:8,padding:"14px 16px",border:`1px solid ${t.border}`}}>
            <div style={{fontVariantNumeric:"tabular-nums",fontSize:32,fontWeight:800,color:running?t.high:t.text,minWidth:90,letterSpacing:"-0.02em"}}>
              {elapsed.toFixed(1)}<span style={{fontSize:16,fontWeight:500,color:t.textMuted}}> s</span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {!running
                ? <button onClick={startTimer} style={{padding:"8px 18px",borderRadius:6,border:`1px solid ${t.elite}`,background:`${t.elite}18`,color:t.elite,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>▶ Start</button>
                : <button onClick={stopTimer}  style={{padding:"8px 18px",borderRadius:6,border:`1px solid ${t.high}`,background:`${t.high}18`,color:t.high,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>■ Stop</button>
              }
              <button onClick={resetTimer} style={{padding:"8px 14px",borderRadius:6,border:`1px solid ${t.border}`,background:t.surfaceBg,color:t.textMuted,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>↺ Reset</button>
            </div>
            {elapsed > 0 && !running && (
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1,flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:t.textMuted}}>Output tokens:</span>
                <input type="number" min="1" placeholder="e.g. 284"
                  value={tokenCount} onChange={e=>setTokenCount(e.target.value)}
                  style={{width:90,padding:"6px 10px",borderRadius:5,border:`1px solid ${t.border}`,
                    background:t.surfaceBg,color:t.text,fontSize:13,fontFamily:"inherit",outline:"none"}}
                />
                {calculatedTps && (
                  <React.Fragment>
                    <span style={{fontSize:16,fontWeight:800,color:tpsColor(calculatedTps),fontVariantNumeric:"tabular-nums"}}>
                      = {calculatedTps} t/s
                    </span>
                    <button onClick={useCalculated}
                      style={{padding:"6px 14px",borderRadius:5,border:`1px solid ${t.elite}`,background:`${t.elite}18`,
                        color:t.elite,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                      Use this ↓
                    </button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>

          {/* Manual TPS entry */}
          <div style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:10}}>Step 3 — Enter your measured TPS</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
            <div style={{position:"relative",flex:"0 0 160px"}}>
              <input type="number" min="0.1" step="0.1"
                value={inputVal}
                onChange={e=>{setInputVal(e.target.value);}}
                onBlur={commitTps}
                placeholder="e.g. 47.3"
                style={{width:"100%",padding:"10px 14px 10px 14px",borderRadius:7,
                  border:`2px solid ${tpsValid?tpsColor(parsedTps):t.border}`,
                  background:t.surfaceBg,color:t.text,fontSize:16,fontFamily:"inherit",
                  fontWeight:700,outline:"none",fontVariantNumeric:"tabular-nums"}}
              />
            </div>
            <span style={{fontSize:16,color:t.textMuted,fontWeight:500}}>tokens / second</span>
            <button onClick={commitTps} disabled={!tpsValid}
              style={{padding:"10px 22px",borderRadius:7,
                border:`1px solid ${tpsValid?tpsColor(parsedTps):t.border}`,
                background:tpsValid?`${tpsColor(parsedTps)}20`:t.raisedBg,
                color:tpsValid?tpsColor(parsedTps):t.textMuted,
                cursor:tpsValid?"pointer":"not-allowed",fontFamily:"inherit",fontSize:14,fontWeight:700,
                opacity:tpsValid?1:0.5}}>
              Save TPS →
            </button>
            {tpsValid && (
              <span style={{fontSize:14,fontWeight:600,color:tpsColor(parsedTps)}}>
                {tpsLabel(parsedTps)}
              </span>
            )}
          </div>

          {/* Impact preview */}
          {tpsValid && (
            <div style={{background:t.dark?"rgba(74,222,128,0.07)":"#f0fdf4",border:`1px solid ${t.dark?"rgba(74,222,128,0.25)":"#bbf7d0"}`,borderRadius:7,padding:"12px 16px",marginTop:4}}>
              <div style={{fontSize:12,fontWeight:700,color:t.elite,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
                Impact on cost table (updates live when you save)
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                {[
                  ["Measured TPS", `${parsedTps} t/s`, tpsColor(parsedTps)],
                  ["vs benchmark", `${((m=>m&&m.tps?(parsedTps/(m.tps[Object.keys(m.tps)[0]]||1)*100-100).toFixed(0):null)(LOCAL_MODELS.find(m=>m.model===targetModel)))||"—"}%`, t.textSub],
                ].map(([label, val, color]) => (
                  <div key={label} style={{background:t.surfaceBg,borderRadius:5,padding:"8px 10px",border:`1px solid ${t.border}`}}>
                    <div style={{fontSize:11,color:t.textMuted,marginBottom:3}}>{label}</div>
                    <div style={{fontSize:16,fontWeight:700,color,fontVariantNumeric:"tabular-nums"}}>{val}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:12,color:t.textMuted,marginTop:8,lineHeight:1.6}}>
                The TPS value flows into: <strong style={{color:t.text}}>amortized cost per token</strong> (lower TPS = higher cost/token),
                <strong style={{color:t.text}}> value score</strong> (score ÷ blended cost), and
                <strong style={{color:t.text}}> TPS bar</strong> in the table.
              </div>
            </div>
          )}
        </div>
      </div>
    </ModalOverlay>
  );
}

            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:t.text,marginBottom:16,letterSpacing:"-0.02em"}}>

            </h3>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {LOCAL_MODELS.map(m => {
                const ut = userTps[m.model];

                  <button

                    <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>

                        : <span style={{fontSize:12,color:t.textFaint}}>not measured</span>
                      }
                      <span style={{fontSize:18,color:t.textMuted}}>›</span>

              })}
            </div>
            <button
              onClick={() => setBenchmarkModel(null)}

              Cancel
            </button>

        </ModalOverlay>

      {benchmarkModel && benchmarkModel !== "_select" && (
        <TpsPanel
          targetModel={benchmarkModel}

            setUserTps(prev => ({ ...prev, [benchmarkModel]: val }));

    </ThemeCtx.Provider>
  );
}

// ── Main component ────────────────────────────────────────────────────────────
const RATIO_DEFAULT = 25;
function calcBlended(inp, out, ratio){ return ((inp*ratio)+(out*1))/(ratio+1); }

function CostIndex({cloudModels, onCloudUpdate, userScores, onUserScoresChange, onOpenBenchmark, benchmarkModel, userTps, onUserTpsChange}) {
  const {t} = useTheme();

  // hardware + hours state
  const [hwId, setHwId]           = useState("zbook");
  const [hrsPerDay, setHrsPerDay] = useState(8);
  const hw = HARDWARE[hwId];
  // user-editable prices per hardware id
  const [customPrices, setCustomPrices] = useState(
    Object.fromEntries(Object.values(HARDWARE).map(h => [h.id, String(h.price)]))
  );
  const [priceErrors, setPriceErrors] = useState({zbook:"", macbook:""});

  // resolved price: custom value if valid, else hw default
  const resolvedPrice = useMemo(() => {
    const v = parseFloat(customPrices[hwId]);
    return (!isNaN(v) && v > 0) ? v : hw.price;
  }, [customPrices, hwId, hw.price]);

  function handlePriceInput(id, raw) {
    setCustomPrices(p => ({...p, [id]: raw}));
    const v = parseFloat(raw);
    setPriceErrors(e => ({...e, [id]: (!raw || isNaN(v) || v <= 0) ? "Enter a valid price > 0" : ""}));
  }

  // filters / display
  const [ratio, setRatio]             = useState(RATIO_DEFAULT);
  const [tierFilter, setTierFilter]   = useState("All");
  const [famFilter, setFamFilter]     = useState("All");
  const [showLocal, setShowLocal]     = useState(true);
  const [sortBy, setSortBy]           = useState("score");
  const [search, setSearch]           = useState("");
  const [rState, setRState]           = useState("idle");
  const [rMsg, setRMsg]               = useState("");
  const [lastUp, setLastUp]           = useState(null);

  // Amortization stats (reactive — use resolvedPrice not hw.price)
  const totalHrs   = useMemo(()=> hw.years * 365 * hrsPerDay, [hw, hrsPerDay]);
  const hrRate     = useMemo(()=> resolvedPrice / totalHrs, [resolvedPrice, totalHrs]);

  // Build local model rows with current hw + hrs + resolvedPrice + user TPS overrides
  const localRows = useMemo(()=>{
    const hwForCost = {...hw, price: resolvedPrice};
    return LOCAL_MODELS.map(m => {
      // userTps[model] overrides the benchmark estimate if the user has measured it
      const benchTps   = m.tps[hw.id] ?? null;
      const measuredTps = userTps[m.model] ?? null;
      const tps         = measuredTps !== null ? measuredTps : benchTps;
      const hasUserTps  = measuredTps !== null;
      const cost = localCostPerMTok(hwForCost, tps, hrsPerDay) ?? 0;
      return {
        ...m,
        score: m.score,
        hasUserTps,
        family: m.family,
        isLocal: true,
        variant: m.quant || "",
        tps,
        benchTps,       // keep original for display comparison
        input: cost,
        output: cost,
        blended: cost,
      };
    });
  }, [hw, hrsPerDay, resolvedPrice, userTps]);

  // Combine + process
  const allRows = useMemo(()=>[...cloudModels, ...localRows],[cloudModels,localRows]);

  const families = useMemo(()=>{
    const s=new Set();
    cloudModels.forEach(m=>s.add(m.family));
    LOCAL_MODELS.forEach(m=>s.add(m.family));
    return["All",...Array.from(s).sort()];
  },[cloudModels]);

  const maxTps = useMemo(()=>Math.max(...allRows.map(m=>m.tps||0),1),[allRows]);

  const processed = useMemo(()=>
    allRows.map(m=>({
      ...m,
      blended: m.isLocal ? m.blended : calcBlended(m.input,m.output,ratio),
    })), [allRows,ratio]);

  const filtered = useMemo(()=>{
    let list = processed.filter(m=>{
      if(!showLocal&&m.isLocal) return false;
      if(tierFilter!=="All"&&getTier(m).label!==tierFilter) return false;
      if(famFilter!=="All"&&m.family!==famFilter) return false;
      if(search){const q=search.toLowerCase();if(!m.model.toLowerCase().includes(q)&&!m.family.toLowerCase().includes(q))return false;}
      return true;
    });
    list.sort((a,b)=>{
      if(sortBy==="score")   return b.score-a.score;
      if(sortBy==="tps")     return (b.tps||0)-(a.tps||0);
      if(sortBy==="blended") return a.blended-b.blended;
      if(sortBy==="value"){const va=a.blended>0?a.score/a.blended:0,vb=b.blended>0?b.score/b.blended:0;return vb-va;}
      return 0;
    });
    return list.map((m,i)=>({...m,_rank:i+1}));
  },[processed,tierFilter,famFilter,showLocal,sortBy,search]);

  // Group by tier when sorted by score
  const rows = useMemo(()=>{
    if(sortBy!=="score") return filtered;
    const out=[];let last=null;
    filtered.forEach(m=>{
      const lbl=getTier(m).label;
      if(lbl!==last){out.push({_tierHdr:true,label:lbl});last=lbl;}
      out.push(m);
    });
    return out;
  },[filtered,sortBy]);

  async function doRefresh(){
    setRState("loading");setRMsg("");
    try{
      const updated = await fetchLatestModels(cloudModels);
      const nc = updated.length - cloudModels.length;
      onCloudUpdate(updated);
      setLastUp(new Date());
      setRMsg(nc>0?`Updated · ${nc} new model${nc>1?"s":""} added`:"Updated · prices and scores refreshed");
      setRState("done");
    }catch(e){setRMsg(`Error: ${e.message}`);setRState("error");}
  }

  const rColor = rState==="error"?"#dc2626":t.refreshTxt;
  const hwColor = hw.color;

  const TH = {padding:"9px 8px",fontSize:16,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:t.textMuted,background:t.headerBg,borderBottom:`1px solid ${t.borderMd}`,whiteSpace:"nowrap",verticalAlign:"bottom",cursor:"pointer",userSelect:"none"};
  const TD = {padding:"8px 8px",borderBottom:`1px solid ${t.border}`,verticalAlign:"middle",background:"inherit"};

  function SortTH({col,children,style={}}){
    const active=sortBy===col;
    return <th onClick={()=>setSortBy(col)} style={{...TH,...style,color:active?(t.dark?"#f1f5f9":t.text):t.textMuted,background:active?(t.dark?"#111827":t.raisedBg):t.headerBg}}>{children}{active?" ↓":""}</th>;
  }

  return (
    <div style={{background:t.pageBg,padding:"18px 14px 48px",fontFamily:"'IBM Plex Mono','Courier New',monospace",color:t.text}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap');
        .ctr:hover td{background:${t.dark?"rgba(255,255,255,0.025)":"rgba(0,0,0,0.02)"}!important;}
        /* ── Cross-browser range slider ── */
        input[type=range]{
          -webkit-appearance:none; appearance:none;
          width:100%; height:20px; background:transparent;
          cursor:pointer; outline:none; padding:0; margin:0;
        }
        input[type=range]::-webkit-slider-runnable-track{
          height:6px; border-radius:3px;
          background:${t.barTrack};
        }
        input[type=range]::-webkit-slider-thumb{
          -webkit-appearance:none; appearance:none;
          width:18px; height:18px; border-radius:50%;
          background:${t.refreshTxt}; cursor:pointer;
          margin-top:-6px; border:2px solid ${t.surfaceBg};
          box-shadow:0 0 0 1px ${t.refreshTxt};
        }
        input[type=range]::-moz-range-track{
          height:6px; border-radius:3px; background:${t.barTrack}; border:none;
        }
        input[type=range]::-moz-range-thumb{
          width:18px; height:18px; border-radius:50%;
          background:${t.refreshTxt}; cursor:pointer;
          border:2px solid ${t.surfaceBg}; box-shadow:0 0 0 1px ${t.refreshTxt};
        }
        input[type=range]::-ms-track{ height:6px; background:transparent; border-color:transparent; color:transparent; }
        input[type=range]::-ms-fill-lower{ background:${t.barTrack}; border-radius:3px; }
        input[type=range]::-ms-fill-upper{ background:${t.barTrack}; border-radius:3px; }
        input[type=range]::-ms-thumb{ width:18px; height:18px; border-radius:50%; background:${t.refreshTxt}; cursor:pointer; }
        input[type=text],input[type=number]{font-family:inherit;}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:${t.pageBg};}
        ::-webkit-scrollbar-thumb{background:${t.borderMd};border-radius:3px;}

                    {/* Score bar */}
                    <td style={{...TD, minWidth:160, verticalAlign:"middle"}}>
                      <ScoreBar score={m.score} color={tc}/>
                    </td>

                    {/* TPS bar */}
                    <td style={{...TD, minWidth:110, verticalAlign:"middle",
                      borderRight:`1px solid ${t.borderMd}`}}>
                      <TpsBar tps={m.tps} maxTps={maxTps} isLocal={m.isLocal} hwColor={hwColor} tierCol={tc}/>
                    </td>

                    {/* Context window */}
                    <td style={{...TD, textAlign:"right", minWidth:68, verticalAlign:"middle"}}>
                      <span style={{fontVariantNumeric:"tabular-nums", fontSize:13,
                        fontWeight:700, color:ctxColor}}>{ctxStr}</span>
                    </td>

                    {/* Params */}
                    <td style={{...TD, textAlign:"left", minWidth:88, verticalAlign:"middle"}}>
                      <span style={{fontSize:12, fontWeight:600, fontVariantNumeric:"tabular-nums",
                        color:paramsColor,
                        fontStyle:!m.params||m.params==="undisclosed"?"italic":"normal"}}>
                        {m.params||"—"}
                      </span>
                    </td>

                    {/* Arch badge */}
                    <td style={{...TD, textAlign:"left", minWidth:62, verticalAlign:"middle",
                      borderRight:`1px solid ${t.borderMd}`}}>
                      {m.arch ? (
                        <span style={{fontSize:11, fontWeight:700, padding:"2px 7px",
                          borderRadius:4, whiteSpace:"nowrap",
                          color:archColor, border:`1px solid ${archBorder}`,
                          background:archBg}}>
                          {archIsMoE ? "MoE" : "Dense"}
                        </span>
                      ) : <span style={{color:t.textFaint}}>—</span>}
                    </td>

                    {/* In cost */}
                    <td style={{...TD, textAlign:"right", verticalAlign:"middle"}}>
                      {m.isLocal ? (
                        <span style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}>
                          <span style={{fontVariantNumeric:"tabular-nums",fontSize:14,fontWeight:700,
                            color:m.tps?hwColor:t.textFaint}}>
                            {fmtCost(m.input)}
                          </span>
                          {m.tps&&<span style={{fontSize:10,color:t.textFaint,lineHeight:1}}>hw/Mtok</span>}
                        </span>
                      ) : (
                        <a href={pricingUrl} target="_blank" rel="noopener noreferrer"
                           title={`${m.family} pricing`}
                           style={{fontVariantNumeric:"tabular-nums",fontSize:14,fontWeight:700,
                             color:t.text,textDecoration:"none",
                             borderBottom:`1px dashed ${t.borderMd}`,paddingBottom:1}}>
                          {fmtCost(m.input)}
                        </a>
                      )}
                    </td>

                    {/* Out cost — same as In for local (hardware rate is symmetric) */}
                    <td style={{...TD, textAlign:"right", verticalAlign:"middle"}}>
                      {m.isLocal ? (
                        <span style={{fontVariantNumeric:"tabular-nums",fontSize:14,
                          color:m.tps?hwColor:t.textFaint}}>
                          {m.tps ? "= In" : "—"}
                        </span>
                      ) : (
                        <a href={pricingUrl} target="_blank" rel="noopener noreferrer"
                           title={`${m.family} pricing`}
                           style={{fontVariantNumeric:"tabular-nums",fontSize:14,
                             color:t.textSub,textDecoration:"none",
                             borderBottom:`1px dashed ${t.borderMd}`,paddingBottom:1}}>
                          {fmtCost(m.output)}
                        </a>
                      )}
                    </td>

                    {/* Blended cost — local = hardware cost (ratio irrelevant), cloud = weighted by ratio */}
                    <td style={{...TD, textAlign:"right", verticalAlign:"middle"}}>
                      {m.isLocal ? (
                        <span style={{fontVariantNumeric:"tabular-nums",fontSize:14,fontWeight:700,
                          display:"inline-block",padding:"2px 8px",borderRadius:5,
                          color:m.tps?hwColor:t.textFaint,
                          background:m.tps?`${hwColor}15`:t.raisedBg,
                          border:`1px solid ${m.tps?hwColor+"50":t.border}`}}
                          title={m.tps?"Hardware amortized cost per million tokens (ratio has no effect — in=out for local hardware)":"Model too large for this hardware"}>
                          {fmtCost(m.blended)}
                        </span>
                      ) : (
                        <a href={pricingUrl} target="_blank" rel="noopener noreferrer"
                           title={`Blended at ${ratio}:1 ratio · click for pricing`}
                           style={{fontVariantNumeric:"tabular-nums",fontSize:14,fontWeight:700,
                             display:"inline-block",padding:"2px 8px",borderRadius:5,
                             color:t.text,background:t.raisedBg,
                             border:`1px solid ${t.border}`,textDecoration:"none"}}>
                          {fmtCost(m.blended)}
                        </a>
                      )}
                    </td>

                    {/* Value score */}
                    <td style={{...TD, textAlign:"right", verticalAlign:"middle"}}>
                      <a href="https://artificialanalysis.ai/leaderboards/models"
                         target="_blank" rel="noopener noreferrer"
                         title="Value = Score ÷ Blended Cost (Artificial Analysis)"
                         style={{fontVariantNumeric:"tabular-nums", fontSize:15, fontWeight:800,
                           color:vc, textDecoration:"none",
                           borderBottom:`1px dashed ${vc}70`, paddingBottom:1}}>
                        {val < 99999 ? val.toFixed(1) : "∞"}
                      </a>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Footer */}
        <div style={{marginTop:16,fontSize:12,color:t.textMuted,lineHeight:1.8,borderTop:`1px solid ${t.border}`,paddingTop:12}}>
          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
            {[["Elite ≥58",t.elite],["High 52-57",t.high],["Mid 46-51",t.mid],["Efficient 36-45",t.efficient],["Compact <36","#9ca3af"]].map(([label,color])=>(
              <span key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:10,height:10,borderRadius:2,background:color,display:"inline-block",flexShrink:0}}/>
                <span>{label}</span>
              </span>
            ))}
            <span style={{color:t.textFaint}}>·</span>
            <span>📦 LOCAL = self-hosted</span>
            <span>💡 = reasoning model</span>
            <span style={{color:t.textFaint}}>·</span>
            <span>Value = Score ÷ Blended Cost (higher = better)</span>
            <span style={{color:t.textFaint}}>·</span>
            <span>Click model name = model card · Click cost = pricing page</span>
          </div>
          <div style={{fontSize:11,color:t.textFaint}}>
            Params: <em>est.</em> = scaling-law estimate · <em>undisclosed</em> = vendor has not published · Cloud TPS: AA 72hr rolling median · Local TPS: llama.cpp Vulkan/RADV (ZBook) + MLX Metal (Mac), community benchmarks Jun 2026
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
